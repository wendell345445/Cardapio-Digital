<!--
  Template: plan-change
  Disparado por: api/src/shared/email/email.service.ts → sendPlanChangeEmail()
  Quando: Owner faz upgrade/downgrade do plano da loja

  Variáveis disponíveis:
    {{adminName}}  — nome do admin
    {{storeName}}  — nome da loja
    {{oldPlan}}    — plano anterior (PROFESSIONAL ou PREMIUM)
    {{newPlan}}    — novo plano

  Edite livremente o HTML abaixo. Use {{variavel}} para interpolar.
-->
<h2 style="margin:0 0 16px 0;font-size:22px;color:#18181b;">
  Alteração de Plano
</h2>

<p style="margin:0 0 12px 0;">
  Olá <strong>{{adminName}}</strong>,
</p>

<p style="margin:0 0 16px 0;">
  O plano da loja <strong>{{storeName}}</strong> foi alterado:
</p>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f4f5;border-radius:6px;margin:0 0 24px 0;">
  <tr>
    <td style="padding:16px 20px;font-size:14px;">
      <p style="margin:0 0 8px 0;"><strong>Plano anterior:</strong> {{oldPlan}}</p>
      <p style="margin:0;"><strong>Novo plano:</strong> {{newPlan}}</p>
    </td>
  </tr>
</table>

<p style="margin:0;color:#52525b;font-size:14px;">
  As novas funcionalidades já estão disponíveis em sua conta.
</p>
