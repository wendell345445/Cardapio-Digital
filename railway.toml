[build]
builder = "nixpacks"

[[services]]
name = "api"
source = "api"

[services.build]
buildCommand = "npm ci && npx prisma generate && npm run build"
startCommand = "npx prisma migrate deploy && npm start"

[[services]]
name = "web"
source = "web"

[services.build]
buildCommand = "npm ci && npm run build"
startCommand = "npx serve dist -s -l 8080"
