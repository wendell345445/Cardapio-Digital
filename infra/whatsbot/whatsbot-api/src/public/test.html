<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whatsbot · Teste</title>
<style>
  :root {
    --wa-bg:#e5ddd5; --wa-header:#075e54; --wa-bubble-out:#dcf8c6;
    --wa-bubble-in:#fff; --wa-text:#111; --wa-muted:#667781;
  }
  * { box-sizing:border-box }
  html, body { margin:0; padding:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#f0f2f5; overflow:hidden; }
  /* Container ancora as 3 áreas via absolute. Solução universal pra fixed
     header + scroll middle + fixed input, funciona em qualquer engine. */
  .wrap { position:relative; max-width:480px; margin:0 auto; height:100vh; height:100dvh; background:#fff; box-shadow:0 0 12px rgba(0,0,0,.08); overflow:hidden; }
  header { position:absolute; top:0; left:0; right:0; z-index:2; }
  form { position:absolute; bottom:0; left:0; right:0; z-index:2; }
  .chat-wrap { position:absolute; left:0; right:0; top:var(--header-h, 100px); bottom:var(--form-h, 60px); overflow:hidden; }
  header { background:var(--wa-header); color:#fff; padding:14px 16px; }
  header h1 { font-size:16px; margin:0 0 8px 0; font-weight:600; display:flex; align-items:center; gap:8px; }
  header .badge { font-size:10px; background:#0c8a76; padding:2px 6px; border-radius:8px; }
  header .row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  header input, header select { width:100%; padding:8px 10px; border:none; border-radius:6px; font-size:13px; background:#fff; color:#111; }
  header input::placeholder { color:#999 }
  header select { appearance:auto; }
  /* min-height fixo reserva o espaço pra 2 linhas — assim o header nunca
     muda de altura quando a meta atualiza o texto, evitando re-cálculo
     do .chat-wrap e quebra do scroll. */
  .meta { font-size:11px; color:rgba(255,255,255,.85); margin-top:6px; min-height:28px; line-height:1.3; }
  .meta.ok { color:#a7f3d0; }
  .meta.err { color:#fecaca; }
  /* .chat preenche o .chat-wrap (que tem altura fixa entre header e form).
     Filhos diretos NÃO devem encolher — senão flex comprime as imagens pra
     caber e scrollHeight nunca passa de clientHeight (não rola). */
  .chat { width:100%; height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; background:var(--wa-bg); padding:12px; display:flex; flex-direction:column; gap:6px; }
  .chat > * { flex-shrink:0; }
  .bubble { max-width:80%; padding:8px 12px; border-radius:8px; font-size:14px; line-height:1.35; word-wrap:break-word; white-space:pre-wrap; position:relative; box-shadow:0 1px 1px rgba(0,0,0,.08); }
  .bubble.me { align-self:flex-end; background:var(--wa-bubble-out); border-bottom-right-radius:2px; }
  .bubble.bot { align-self:flex-start; background:var(--wa-bubble-in); border-bottom-left-radius:2px; }
  .bubble.sys { align-self:center; background:rgba(255,255,255,.7); color:var(--wa-muted); font-size:12px; padding:4px 10px; border-radius:12px; box-shadow:none; }
  .bubble small { display:block; color:var(--wa-muted); font-size:10px; margin-top:4px; text-align:right; }
  .card { align-self:flex-start; max-width:80%; background:var(--wa-bubble-in); border-radius:8px; border-bottom-left-radius:2px; overflow:hidden; box-shadow:0 1px 1px rgba(0,0,0,.08); }
  /* Reserva altura ANTES da imagem carregar (aspect-ratio 4:3). Sem isso a
     img começa com height:0 e empurra o layout quando termina de baixar,
     quebrando o scrollTop calculado no addProductCard. */
  .card img { display:block; width:100%; height:240px; object-fit:cover; background:#eee; }
  .card .cap { padding:8px 12px; font-size:14px; line-height:1.35; white-space:pre-wrap; word-wrap:break-word; }
  .card .cap b { font-weight:600 }
  .card small { display:block; padding:0 12px 8px; color:var(--wa-muted); font-size:10px; text-align:right; }
  .typing { display:inline-flex; gap:3px; padding:8px 12px; }
  .typing span { width:6px; height:6px; background:var(--wa-muted); border-radius:50%; animation:blink 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay:.2s } .typing span:nth-child(3){ animation-delay:.4s }
  @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }
  form { padding:8px; background:#f0f2f5; display:flex; gap:6px; }
  form input[name=msg] { flex:1; padding:10px 14px; border:1px solid #ddd; border-radius:24px; font-size:14px; }
  form button { background:var(--wa-header); color:#fff; border:none; width:42px; height:42px; border-radius:50%; font-size:18px; cursor:pointer; }
  form button:disabled { background:#888; cursor:not-allowed; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🤖 Whatsbot <span class="badge">TESTE</span></h1>
    <div class="row">
      <select id="slug">
        <option value="">Carregando lojas…</option>
      </select>
      <input id="phone" type="text" placeholder="telefone (ex: 5511999999999)" autocomplete="off" />
    </div>
    <div id="meta" class="meta">Preencha slug + telefone e mande uma mensagem.</div>
  </header>

  <div class="chat-wrap">
    <div id="chat" class="chat">
      <div class="bubble sys">Whatsbot é puramente informativo. As respostas saem da VM GCP rodando Ollama (CPU). Primeira resposta pode levar 30–90s.</div>
    </div>
  </div>

  <form id="form" autocomplete="off">
    <input id="msg" name="msg" type="text" placeholder="Digite uma mensagem" autofocus required />
    <button id="send" type="submit" title="Enviar">➤</button>
  </form>
</div>

<script>
(function () {
  // Mede a altura real do header e form e seta diretamente no .chat-wrap
  // como inline style. Mais previsível que CSS var em alguns engines.
  const wrap = document.querySelector('.wrap')
  const hdr = wrap.querySelector('header')
  const frm = wrap.querySelector('form')
  const chatWrap = document.querySelector('.chat-wrap')
  function syncOffsets() {
    const hH = hdr.getBoundingClientRect().height
    const fH = frm.getBoundingClientRect().height
    chatWrap.style.top = hH + 'px'
    chatWrap.style.bottom = fH + 'px'
  }
  syncOffsets()
  window.addEventListener('resize', syncOffsets)
  new ResizeObserver(syncOffsets).observe(hdr)
  new ResizeObserver(syncOffsets).observe(frm)
  // Garante 1 sync após paint inicial (alguns navegadores reportam height
  // 0 no primeiro frame antes de fonts/imagens carregarem).
  requestAnimationFrame(() => requestAnimationFrame(syncOffsets))

  const chat = document.getElementById('chat')
  const form = document.getElementById('form')
  const meta = document.getElementById('meta')
  const msgEl = document.getElementById('msg')
  const slugEl = document.getElementById('slug')
  const phoneEl = document.getElementById('phone')
  const sendBtn = document.getElementById('send')

  // Persiste slug+phone entre reloads
  phoneEl.value = localStorage.getItem('wb_phone') || ''
  phoneEl.addEventListener('change', () => localStorage.setItem('wb_phone', phoneEl.value.trim()))
  slugEl.addEventListener('change', () => localStorage.setItem('wb_slug', slugEl.value))

  // Carrega lista de lojas PROD do Railway
  ;(async () => {
    try {
      const res = await fetch('/test/stores')
      const data = await res.json()
      if (!res.ok || !Array.isArray(data.stores)) throw new Error(data.error || 'falha')
      const saved = localStorage.getItem('wb_slug') || ''
      // Label do option mostra o host PÚBLICO real da loja:
      // customDomain quando existe (precedência), senão {slug}.menupanda.com.br
      slugEl.innerHTML = '<option value="">— escolha uma loja —</option>' +
        data.stores.map(s => {
          const host = s.customDomain || (s.slug + '.menupanda.com.br')
          return `<option value="${s.slug}">${s.name} (${host})</option>`
        }).join('')
      if (saved && data.stores.some(s => s.slug === saved)) slugEl.value = saved
      meta.textContent = data.stores.length + ' lojas disponíveis. Escolha uma e mande uma mensagem.'
    } catch (err) {
      slugEl.innerHTML = '<option value="">erro ao carregar</option>'
      meta.textContent = 'Erro ao buscar lojas: ' + err.message
      meta.className = 'meta err'
    }
  })()

  function ts() {
    const d = new Date()
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0')
  }
  function addBubble(role, text, latencyMs) {
    const b = document.createElement('div')
    b.className = 'bubble ' + role
    b.textContent = text
    if (latencyMs != null) {
      const small = document.createElement('small')
      small.textContent = ts() + ' · ' + (latencyMs/1000).toFixed(1) + 's'
      b.appendChild(small)
    } else if (role !== 'sys') {
      const small = document.createElement('small')
      small.textContent = ts()
      b.appendChild(small)
    }
    chat.appendChild(b)
    chat.scrollTop = chat.scrollHeight
    return b
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]))
  }
  // Markdown leve do WhatsApp: *bold* → <b>, _italic_ → <i>. Mantém quebras.
  function captionToHtml(text) {
    let s = escapeHtml(text)
    s = s.replace(/\*(.+?)\*/g, '<b>$1</b>')
    s = s.replace(/_([^_]+)_/g, '<i>$1</i>')
    // Linkifica URLs
    s = s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
    return s
  }
  function addProductCard(img) {
    const card = document.createElement('div')
    card.className = 'card'
    const imgEl = document.createElement('img')
    imgEl.alt = ''
    // Não usar lazy aqui — o card sempre entra visível e queremos a altura
    // fixa logo. O `height:240px` no CSS já reserva o espaço antes do load.
    card.appendChild(imgEl)
    const cap = document.createElement('div')
    cap.className = 'cap'
    cap.innerHTML = captionToHtml(img.caption)
    card.appendChild(cap)
    const small = document.createElement('small')
    small.textContent = ts()
    card.appendChild(small)
    chat.appendChild(card)
    // Re-ajusta o scroll quando a imagem terminar de carregar — caso o layout
    // mude algo (raro com height fixa, mas não custa). Erros de imagem só
    // ignoram (placeholder fica cinza).
    imgEl.onload = () => { chat.scrollTop = chat.scrollHeight }
    imgEl.onerror = () => { imgEl.style.display = 'none' }
    imgEl.src = img.imageUrl
    chat.scrollTop = chat.scrollHeight
  }
  function addTyping() {
    const b = document.createElement('div')
    b.className = 'bubble bot'
    b.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>'
    chat.appendChild(b)
    chat.scrollTop = chat.scrollHeight
    return b
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    const slug = slugEl.value
    const phone = phoneEl.value.trim()
    const message = msgEl.value.trim()
    if (!slug || !phone || !message) {
      meta.textContent = 'Escolha uma loja, preencha o telefone e a mensagem.'
      meta.className = 'meta err'
      return
    }
    addBubble('me', message)
    msgEl.value = ''
    sendBtn.disabled = true
    const typing = addTyping()
    meta.textContent = 'Aguardando resposta da IA... (pode levar 30–90s na primeira)'
    meta.className = 'meta'

    try {
      const res = await fetch('/test/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug, customerPhone: phone, message }),
      })
      typing.remove()
      const data = await res.json()
      if (!res.ok) {
        addBubble('sys', '⚠️ ' + (data.error || 'erro') + (data.detail ? ': ' + data.detail.slice(0,120) : ''))
        meta.textContent = 'Erro: ' + (data.error || res.status)
        meta.className = 'meta err'
      } else {
        addBubble('bot', data.reply, data.latencyMs)
        if (Array.isArray(data.images)) {
          data.images.forEach(addProductCard)
        }
        meta.textContent = data.storeName + ' · ' + (data.isOpenNow ? '🟢 aberta' : '🔴 fechada') +
          ' · RAG hits: ' + data.memoryHits + (data.usedProfile ? ' · perfil ✓' : '') +
          (data.images?.length ? ' · 🖼 ' + data.images.length : '')
        meta.className = 'meta ok'
      }
    } catch (err) {
      typing.remove()
      addBubble('sys', '⚠️ Falha de rede: ' + err.message)
      meta.textContent = 'Falha de rede'
      meta.className = 'meta err'
    } finally {
      sendBtn.disabled = false
      msgEl.focus()
    }
  })
})()
</script>
</body>
</html>
